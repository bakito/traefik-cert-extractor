version: 2
builds:
  - skip: true
    main: ./cmd/generic/main.go
    ldflags:
      - -s -w -X github.com/bakito/traefik-cert-extractor/version.Version={{.Version}}
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Version }}-next"
release:
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
